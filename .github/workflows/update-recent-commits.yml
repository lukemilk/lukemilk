name: Atualizar tabela de commits no README

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: update-readme-commits
  cancel-in-progress: true

jobs:
  commits:
    # Evita loop: o commit automático do bot não dispara outro run
    if: github.event_name != 'push' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gerar tabela de commits recentes (eventos públicos)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: lukemilk
        run: |
          python3 << 'PY'
          import json
          import os
          import re
          import urllib.error
          import urllib.request

          username = os.environ["USERNAME"]
          token = os.environ["GH_TOKEN"]

          req = urllib.request.Request(
              f"https://api.github.com/users/{username}/events/public?per_page=100",
              headers={
                  "Authorization": f"Bearer {token}",
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
                  "User-Agent": "lukemilk-profile-readme",
              },
          )

          with urllib.request.urlopen(req) as resp:
              events = json.load(resp)

          rows = []
          seen = set()

          for ev in events:
              if ev.get("type") != "PushEvent":
                  continue
              repo = ev.get("repo", {}).get("name", "")
              for c in ev.get("payload", {}).get("commits") or []:
                  sha = c.get("sha") or ""
                  if not sha or sha in seen:
                      continue
                  seen.add(sha)
                  short = sha[:7]
                  msg = (c.get("message") or "").strip().split("\n")[0]
                  if len(msg) > 72:
                      msg = msg[:69] + "…"
                  link = f"https://github.com/{repo}/commit/{sha}"
                  repo_link = f"https://github.com/{repo}"
                  rows.append(
                      f"| [`{short}`]({link}) | [{repo}]({repo_link}) | {msg} |"
                  )
                  if len(rows) >= 12:
                      break
              if len(rows) >= 12:
                  break

          if not rows:
              table_body = "| — | — | *Sem pushes públicos recentes na API de eventos.* |"
          else:
              table_body = "\n".join(rows)

          new_section = (
              "<!--BEGIN:commits-->\n"
              "| Hash | Repositório | Mensagem |\n"
              "|------|-------------|----------|\n"
              f"{table_body}\n"
              "<!--END:commits-->"
          )

          path = "README.md"
          text = open(path, encoding="utf-8").read()
          pattern = re.compile(
              r"<!--BEGIN:commits-->.*?<!--END:commits-->",
              re.DOTALL,
          )
          if not pattern.search(text):
              raise SystemExit("Marcadores <!--BEGIN:commits--> não encontrados no README.md")
          text = pattern.sub(new_section, text)
          open(path, "w", encoding="utf-8").write(text)
          print("README.md atualizado com", len(rows), "linhas de commits.")
          PY

      - name: Commit e push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --staged --quiet; then
            echo "Nenhuma alteração."
            exit 0
          fi
          git commit -m "docs(readme): atualiza tabela de commits recentes"
          git push
